services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: home-dashboard:latest
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    env_file:
      - .env
    volumes:
      - ./data:/app/data
